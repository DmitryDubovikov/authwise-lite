# CI-гейт (offline, replay, без секретов). make check включает path-assertion gate
# (tests/test_path_gate.py) — регрессия маршрутизации краснит джоб. Шаг path-gate печатает
# таблицу «ожидаемый vs фактический путь» в лог (витрина). Branch protection на main требует
# контекст `check` — тогда красный гейт блокирует мёрдж (включается отдельно, ceremony финала).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - run: make check
        env:
          UV_NO_SYNC: "1"
      - run: make path-gate  # таблица ожид vs факт по базовой пачке (replay, $0)
        env:
          UV_NO_SYNC: "1"
